<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha APK Store</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <i class="fas fa-cube"></i>
                <span>AlphaStore</span>
            </div>
            <div class="nav-search">
                <input type="text" id="searchInput" placeholder="Search apps...">
                <button id="searchBtn"><i class="fas fa-search"></i></button>
            </div>
            <div class="nav-links" id="navLinks">
                <a href="#" class="nav-home">Home</a>
                <a href="#" class="nav-categories">Categories</a>
                <a href="#" id="navAuth" class="btn-primary">Login</a>
            </div>
        </div>
    </nav>

    <main class="container" id="mainContent"></main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 Alpha APK Store. All rights reserved.</p>
            <div class="footer-links">
                <a href="#">About</a>
                <a href="#">Privacy</a>
                <a href="#">Terms</a>
                <a href="#">Contact</a>
            </div>
        </div>
    </footer>

    <script src="api.js"></script>
    <script src="auth.js"></script>
    <script src="components.js"></script>
    <script src="app.js"></script>
</body>
</html>
